name: Validate Monitor Data

on:
  push:
    paths:
      - "data.js"
      - "generated/**"
      - "config/**"
      - "scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "data.js"
      - "generated/**"
      - "config/**"
      - "scripts/**"
      - ".github/workflows/**"

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate data structure
        shell: pwsh
        run: .\scripts\validate-monitor-data.ps1
